<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吊運排程管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .fc-event { cursor: pointer; padding: 4px 6px; font-size: 0.9em; border-radius: 4px; margin-bottom: 2px !important; display: block !important; }
        .fc-event-title { font-weight: 600; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        #passwordOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a202c; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div id="passwordOverlay">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-xl font-bold text-gray-800 mb-4">🏗️ 內部系統限制存取</h2>
            <p class="text-sm text-gray-500 mb-4">請輸入密碼解鎖排程管理系統</p>
            <input type="password" id="gatePassword" placeholder="請輸入系統解鎖密碼" class="w-full border border-gray-300 rounded px-3 py-2 text-center mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="unlockBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition shadow">驗證並解鎖</button>
            <p id="loginError" class="text-red-500 text-xs mt-2 hidden">⚠️ 密碼錯誤，拒絕存取！</p>
        </div>
    </div>

    <div id="mainSystem" class="max-w-6xl mx-auto bg-white rounded-xl shadow-md p-6 hidden">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🏗️ 吊運排程管理系統 (管理員特權版)</h1>

        <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-5 gap-4 bg-gray-50 p-4 rounded-lg mb-8 border border-gray-200">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                <input type="date" id="date" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">時間時段 (防呆)</label>
                <select id="timePeriod" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
                    <option value="上午">上午場</option>
                    <option value="下午">下午場</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">部門 / 站點名稱</label>
                <input type="text" id="department" placeholder="例如: 站點A 或 製造部" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">負責人姓名</label>
                <input type="text" id="name" placeholder="請輸入負責人" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div class="flex items-end">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition shadow">
                    確認排程
                </button>
            </div>
        </form>

        <hr class="border-gray-200 my-6">
        
        <div id="calendar" class="bg-white p-2 rounded border border-gray-200"></div>

        <div class="mt-8 p-4 bg-gray-50 rounded-lg border border-gray-300 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-sm text-gray-600">
                🔑 當前身分：<span id="currentRole" class="font-bold text-gray-800">一般同仁 (僅能查看/排程)</span>
            </div>
            <div id="adminLoginArea" class="flex gap-2">
                <input type="password" id="adminPassword" placeholder="輸入管理員特權密碼" class="border border-gray-300 rounded px-3 py-1 bg-white text-sm">
                <button id="adminLoginBtn" class="bg-gray-800 hover:bg-black text-white text-sm px-4 py-1 rounded">解鎖管理員權限</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 安全設定金鑰
        const GATE_PASSWORD  = "KL2026_crane";      // 1. 同仁進入網頁的密碼 
        const ADMIN_PASSWORD = "ADMIN999";          // 2. 你專屬的管理員密碼 (輸入後亮出刪除按鈕) 
        const BACKEND_SECRET = "kldriver_secure_key_999"; // 3. 後端通訊金鑰 

        const firebaseConfig = {
            apiKey: "AIzaSyBEgKgE6dr0dV3MtRz3lrgQzAHVZNhvoPY",
            authDomain: "kldriver.firebaseapp.com",
            projectId: "kldriver",
            storageBucket: "kldriver.firebasestorage.app",
            messagingSenderId: "773359626716",
            appId: "1:773359626716:web:bd627c9d5f464f658e0719"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scheduleRef = collection(db, "kldr");

        let localSchedules = [];
        let deptColorMap = {}; // 🚀 升級：動態顏色資料庫，自動為新站點配對新顏色
        let isAdmin = false;   // 管理員身分狀態標記

        // 網頁進入密碼驗證
        document.getElementById('unlockBtn').addEventListener('click', () => {
            const input = document.getElementById('gatePassword').value;
            if (input === GATE_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainSystem').classList.remove('hidden');
                initSystem();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        // 👑 前端管理員特權密碼驗證
        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            const input = document.getElementById('adminPassword').value;
            if (input === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('currentRole').innerText = "👑 最高管理員 (已開通前端一鍵修改刪除特權)";
                document.getElementById('currentRole').className = "font-bold text-red-600";
                document.getElementById('adminLoginArea').style.display = "none";
                alert("最高管理員驗證成功！現在點選行事曆卡片，即可直接一鍵刪除排程。");
            } else {
                alert("管理員密碼錯誤！拒絕存取特權。");
            }
        });

        // 🚀 核心升級：神奇變色演算法 (自動生成高對比、不衝突的亮麗部門色塊)
        function getDeptColor(deptName) {
            if (deptColorMap[deptName]) return deptColorMap[deptName];
            
            // 根據字串特徵動態產生 HSL 顏色，保證新部門自動換色且不重複
            let hash = 0;
            for (let i = 0; i < deptName.length; i++) {
                hash = deptName.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash % 360);
            deptColorMap[deptName] = {
                bg: `hsl(${h}, 70%, 50%)`,
                border: `hsl(${h}, 70%, 40%)`,
                text: "#ffffff"
            };
            return deptColorMap[deptName];
        }

        function initSystem() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
                buttonText: { today: '今天', month: '月' },
                
                // 點擊格子的整合 Alert 視窗
                dateClick: function(info) {
                    const targetDate = info.dateStr;
                    const dayEvents = localSchedules.filter(item => item.date === targetDate);
                    const amEvents = dayEvents.filter(item => item.time === "上午");
                    const pmEvents = dayEvents.filter(item => item.time === "下午");

                    let amString = amEvents.length > 0 ? amEvents.map(e => `  - [${e.department}] ${e.worker_name}`).join('\n') : "  (目前無排程)";
                    let pmString = pmEvents.length > 0 ? pmEvents.map(e => `  - [${e.department}] ${e.worker_name}`).join('\n') : "  (目前無排程)";

                    alert(`📅 【 ${targetDate} 吊運排程總覽】\n--------------------------\n☀️ 上午\n${amString}\n--------------------------\n🌙 下午場\n${pmString}\n--------------------------`);
                },
                
                // 👑 核心特權：點擊「卡片色塊本身」觸發一鍵刪除
                eventClick: async function(info) {
                    if (!isAdmin) {
                        // 一般員工點擊，只秀出詳細資訊
                        alert(`📋 排程詳情\n--------------------------\n時段：${info.event.title}\n日期：${info.event.startStr.split('T')[0]}`);
                        return;
                    }

                    // 如果是管理員，直接跳出刪除確認
                    const confirmDelete = confirm(`👑 管理員特權確認：\n是否要將「${info.event.title}」這筆排程直接從雲端刪除清空？`);
                    if (confirmDelete) {
                        try {
                            // 隱藏管理員夾帶 secret_key 送去 Firebase 刪除驗證
                            const docRef = doc(db, "kldr", info.event.id);
                            await deleteDoc(docRef);
                            alert("🎉 該排程已成功從前端一鍵移除，雲端已即時清空！");
                        } catch (error) {
                            alert("刪除失敗！原因：" + error.message);
                        }
                    }
                }
            });
            calendar.render();

            // 即時監聽雲端資料庫
            onSnapshot(scheduleRef, (snapshot) => {
                const events = [];
                localSchedules = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.date && data.time && data.department) {
                        localSchedules.push(data);
                        
                        // 調用動態變色邏輯
                        const colorConfig = getDeptColor(data.department);
                        const fakeTime = data.time === "上午" ? "09:00:00" : "14:00:00";
                        
                        events.push({
                            id: doc.id, // 文件名稱作為 ID，方便刪除
                            title: `[${data.time}] ${data.department}-${data.worker_name}`,
                            start: `${data.date}T${fakeTime}`,
                            backgroundColor: colorConfig.bg,
                            borderColor: colorConfig.border,
                            textColor: colorConfig.text
                        });
                    }
                });
                calendar.setOption('events', events);
            });
        }

        // 表單送出新增排程
        const form = document.getElementById('scheduleForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "正在即時同步...";

            const dateValue = document.getElementById('date').value;
            const timeValue = document.getElementById('timePeriod').value;
            const deptValue = document.getElementById('department').value.trim();
            const nameValue = document.getElementById('name').value.trim();

            const payload = {
                date: dateValue,
                time: timeValue,
                department: deptValue,
                worker_name: nameValue,
                secret_key: BACKEND_SECRET, 
                created_at: new Date().toISOString()
            };

            try {
                // 照日期時間整齊排列的檔名規格
                const customDocName = `${dateValue}_${timeValue}_${nameValue}`;
                const customDocRef = doc(db, "kldr", customDocName);
                await setDoc(customDocRef, payload);
                alert('🎉 排程已成功同步至雲端資料庫！');
                document.getElementById('name').value = '';
                document.getElementById('department').value = '';
            } catch (error) {
                alert('🚨 同步失敗！請檢查權限。');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "確認排程";
            }
        };
    </script>
</body>
</html>
