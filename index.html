<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吊運排程管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .fc-event { cursor: pointer; padding: 2px 4px; font-size: 0.85em; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🏗️ 吊運排程管理系統</h1>

        <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-5 gap-4 bg-gray-50 p-4 rounded-lg mb-8 border border-gray-200">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                <input type="date" id="date" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">時間</label>
                <input type="time" id="time" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">部門</label>
                <select id="department" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
                    <option value="製造部">製造部 (綠色)</option>
                    <option value="設備部">設備部 (藍色)</option>
                    <option value="品保部">品保部 (紫色)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                <input type="text" id="name" placeholder="請輸入負責人" required class="w-full border border-gray-300 rounded px-3 py-2 bg-white">
            </div>
            <div class="flex items-end">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition shadow">
                    確認排程
                </button>
            </div>
        </form>

        <hr class="border-gray-200 my-6">
        <div id="calendar" class="bg-white p-2 rounded border border-gray-200"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 精確對接你的 KLDrive 專案金鑰
        const firebaseConfig = {
  apiKey: "AIzaSyBEgKgE6dr0dV3MtRz3lrgQzAHVZNhvoPY",
  authDomain: "kldriver.firebaseapp.com",
  projectId: "kldriver",
  storageBucket: "kldriver.firebasestorage.app",
  messagingSenderId: "773359626716",
  appId: "1:773359626716:web:bd627c9d5f464f658e0719"
};

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scheduleRef = collection(db, "kldr"); // 對接你的 kldr 抽屜

        const deptColors = {
            "製造部": { bg: "#2ecc71", border: "#27ae60", text: "#ffffff" },
            "設備部": { bg: "#3498db", border: "#2980b9", text: "#ffffff" },
            "品保部": { bg: "#9b59b6", border: "#8e44ad", text: "#ffffff" }
        };

        // 渲染行事曆
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
            buttonText: { today: '今天', month: '月', week: '週' }
        });
        calendar.render();

        // 核心修正：改用直接監聽表單的 submit 且移除防阻擋干擾
        const form = document.getElementById('scheduleForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            
            // 變更按鈕狀態，防止重複點擊
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "正在同步至雲端...";

            const dateValue = document.getElementById('date').value;
            const timeValue = document.getElementById('time').value;
            const deptValue = document.getElementById('department').value;
            const nameValue = document.getElementById('name').value;

            // 完美的 4 大必備紀錄資料包
            const payload = {
                date: dateValue,
                time: timeValue,
                department: deptValue,
                worker_name: nameValue,
                created_at: new Date().toISOString()
            };

            try {
                // 送往 Firebase
                await addDoc(scheduleRef, payload);
                
                // 成功彈窗
                alert('🎉 排程已成功同步至雲端資料庫！');
                document.getElementById('name').value = '';
            } catch (error) {
                // 如果失敗，強迫彈出紅色驚嘆號視窗並吐出真正原因
                alert('🚨 同步失敗！錯誤原因：' + error.message);
                console.error(error);
            } finally {
                // 恢復按鈕
                btn.disabled = false;
                btn.innerText = "確認排程";
            }
        };

        // 即時讀取雲端並顯示
        onSnapshot(scheduleRef, (snapshot) => {
            const events = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.date && data.time && data.department) {
                    const colorConfig = deptColors[data.department] || { bg: "#34495e", border: "#2c3e50", text: "#ffffff" };
                    events.push({
                        id: doc.id,
                        title: `${data.time} [${data.department}] ${data.worker_name}`,
                        start: `${data.date}T${data.time}:00`,
                        backgroundColor: colorConfig.bg,
                        borderColor: colorConfig.border,
                        textColor: colorConfig.text
                    });
                }
            });
            calendar.setOption('events', events);
        });
    </script>
</body>
</html>
