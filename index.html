<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>吊運排程管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 🎨 全域藝術配色配置 - 核心萊姆底色 */
        body {
            background-color: #F5FFCD !important;
            color: #27272a !important;
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif !important;
        }

        /* 📅 FullCalendar 螢幕自適應優化與縮放調整 */
        .fc {
            --fc-border-color: #e4e4e7 !important;
            --fc-page-bg-color: #ffffff !important;
            --fc-neutral-text-color: #52525b !important;
            min-height: 78vh !important; 
        }

        .fc-daygrid-day-frame {
            min-height: 105px !important;
        }
        
        /* 🎨 強制卡片變長條狀、填滿顏色、字體改為有感 14px */
        .fc-event { 
            cursor: pointer; 
            padding: 6px 10px !important; 
            font-size: 14px !important;   
            border-radius: 6px !important; 
            margin-bottom: 5px !important; 
            border: none !important;
            display: block !important; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.07);
            transition: transform 0.1s ease;
        }

        .fc-event:hover {
            transform: scale(1.01);
        }
        .fc-event-title { 
            font-weight: 600 !important; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            overflow: hidden; 
            color: #ffffff !important; 
        }
        .fc-daygrid-event-dot { display: none !important; }
        .fc-event-time { display: none !important; }
        
        /* 🔒 密碼遮罩 */
        #passwordOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #F5FFCD; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        .fc .fc-col-header-cell {
            background-color: #fafafa !important;
            padding: 12px 0 !important;
            color: #27272a !important;
            font-weight: 700;
        }
        .fc .fc-daygrid-day-number {
            color: #27272a !important;
            padding: 6px 8px !important;
            font-weight: 600;
        }
        .fc .fc-day-today {
            background-color: #fefce8 !important;
            border: 2px solid #eab308 !important;
        }
        .fc-day-other {
            opacity: 0.4;
        }
        .fc .fc-toolbar-title {
            color: #27272a !important;
            font-size: 1.4rem !important;
            font-weight: 800 !important;
        }
        @media (min-width: 768px) {
            .fc .fc-toolbar-title { font-size: 1.7rem !important; }
        }
        .fc .fc-button-primary {
            background-color: #ffffff !important;
            border-color: #e4e4e7 !important;
            color: #27272a !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important;
            transition: all 0.2s;
        }
        .fc .fc-button-primary:hover {
            background-color: #f4f4f5 !important;
            border-color: #d4d4d8 !important;
        }

        /* 內嵌自訂彈窗樣式 */
        #customAlertModal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #customAlertModal .modal-content {
            background-color: #FFFFFF;
            border: 2px solid #27272a;
            border-radius: 16px;
            width: 100%;
            max-w: 650px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            font-size: 18px !important; 
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif !important;
            color: #27272a;
            line-height: 1.6;
        }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6 lg:p-8">

    <div id="passwordOverlay">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border border-zinc-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">🏗️ 內部系統限制存取</h2>
            <p class="text-sm text-gray-400 mb-6">請輸入密碼解鎖排程管理系統</p>
            <input type="password" id="gatePassword" placeholder="請輸入系統解鎖密碼" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2.5 text-center mb-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
            <div class="px-1"><button id="unlockBtn" class="w-full bg-zinc-900 hover:bg-black text-white font-bold py-2.5 rounded-xl transition shadow-md">驗證並解鎖</button></div>
            <p id="loginError" class="text-red-500 text-xs mt-3 hidden">⚠️ 密碼錯誤，拒絕存取！</p>
        </div>
    </div>

    <div id="customAlertModal">
        <div class="modal-content p-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b-2 border-zinc-200 pb-3 mb-4 gap-2">
                <div class="flex flex-col gap-1">
                    <h3 class="text-lg font-extrabold text-zinc-800" id="modalTitle">📅 排程總覽</h3>
                    <div class="text-sm font-bold text-emerald-800 tracking-wide" id="modalStatsTitle"></div>
                </div>
                <button onclick="closeCustomModal()" class="text-zinc-400 hover:text-zinc-800 text-3xl font-bold transition self-end sm:self-center">&times;</button>
            </div>
            <div id="modalBody" class="whitespace-pre-wrap font-semibold tracking-wide overflow-y-auto max-h-[60vh] pr-1">
            </div>
            <div class="mt-5 border-t border-zinc-100 pt-3 flex flex-wrap justify-between items-center gap-3">
                <button id="modalToggleWorkTypeBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2 rounded-xl transition shadow-md hidden">🔄 變更作業項目</button>
                <button id="modalDeleteBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-4 py-2 rounded-xl transition shadow-md hidden">🗑️ 刪除此筆排程</button>
                <button onclick="closeCustomModal()" class="bg-zinc-900 hover:bg-black text-white font-bold text-sm px-5 py-2 rounded-xl transition shadow-md ml-auto">關閉視窗</button>
            </div>
        </div>
    </div>

    <div id="mainSystem" class="max-w-[1600px] mx-auto bg-white/95 rounded-2xl shadow-xl p-4 md:p-6 hidden border border-zinc-200/50">
        <h1 class="text-2xl font-extrabold text-zinc-800 mb-6 text-center tracking-wide">
            🏗️ 吊運排程管理系統
        </h1>

        <form id="scheduleForm" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 bg-zinc-50/80 p-5 rounded-xl mb-6 border border-zinc-100">
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">日期</label>
                <input type="date" id="date" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">時間時段</label>
                <select id="timePeriod" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
                    <option value="上午場">上午場</option>
                    <option value="下午場">下午場</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">作業項目</label>
                <select id="workType" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
                    <option value="吊運">吊運</option>
                    <option value="電梯">電梯</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">樓層</label>
                <select id="floor" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
                    <option value="">-- 請選擇樓層 --</option>
                    <option value="1F">1F</option>
                    <option value="2F">2F</option>
                    <option value="3F">3F</option>
                    <option value="4F">4F</option>
                    <option value="5F">5F</option>
                    <option value="6F">6F</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">部門 / 站點</label>
                <select id="department" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
                    <option value="">-- 請選擇站點 --</option>
                    <option value="BE/Recon">BE/Recon</option>
                    <option value="RDL">RDL</option>
                    <option value="FC">FC</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">機台名稱</label>
                <input type="text" id="machine" placeholder="例如：1號機" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 tracking-wider mb-1.5">負責人姓名</label>
                <input type="text" id="name" placeholder="請輸入負責人" required class="w-full bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-2 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-400 transition">
            </div>
            <div class="flex items-end sm:col-span-2 md:col-span-4 lg:col-span-7 mt-2">
                <button type="submit" id="submitBtn" class="w-full bg-zinc-900 hover:bg-black text-white font-bold py-3 px-4 rounded-lg transition shadow-md cursor-pointer text-base">
                    確認排程

        </form>

        <div class="bg-zinc-100/80 border border-zinc-200 p-4 rounded-xl mb-6 flex flex-col sm:flex-row gap-4 items-center">
            <div class="flex items-center gap-1.5 shrink-0">
                <span class="text-sm font-black text-zinc-700 tracking-wider">🔍 看板即時篩選：</span>
            </div>
            <div class="grid grid-cols-2 gap-3 w-full sm:w-auto sm:flex sm:flex-row items-center">
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-zinc-500">樓層</label>
                    <select id="filterFloor" class="bg-white border border-zinc-300 text-zinc-800 font-semibold rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-400 transition min-w-[110px]">
                        <option value="ALL">全部樓層</option>
                        <option value="1F">1F</option>
                        <option value="2F">2F</option>
                        <option value="3F">3F</option>
                        <option value="4F">4F</option>
                        <option value="5F">5F</option>
                        <option value="6F">6F</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-zinc-500">站點</label>
                    <select id="filterDept" class="bg-white border border-zinc-300 text-zinc-800 font-semibold rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-400 transition min-w-[110px]">
                        <option value="ALL">全部站點</option>
                        <option value="BE/Recon">BE/Recon</option>
                        <option value="RDL">RDL</option>
                        <option value="FC">FC</option>
                    </select>
                </div>
                <button id="resetFilterBtn" class="bg-zinc-200 hover:bg-zinc-300 text-zinc-700 font-bold text-xs px-3 py-1.5 rounded-lg transition border border-zinc-300">清除篩選</button>
            </div>
            <div class="text-xs text-zinc-400 sm:ml-auto text-center sm:text-right">
                💡 篩選僅影響您的畫面，不影響雲端資料庫。
            </div>
        </div>
        
        <div id="calendar" class="p-2 rounded-xl border border-zinc-100 bg-white"></div>

        <div class="mt-6 p-5 bg-zinc-50 rounded-xl border border-zinc-200 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-5">
            <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-6 w-full xl:w-auto">
                <div class="text-sm text-zinc-500 font-medium shrink-0">
                    🔑 當前身分：<span id="currentRole" class="font-bold text-zinc-700">一般同仁 (僅能查看/排程)</span>
                </div>
                <div class="text-sm font-black text-red-600 bg-red-50 border border-red-200/60 px-4 py-1.5 rounded-xl tracking-wide shadow-xs shrink-0">
                    🔥 雲端全歷史總計 ➔ 全體吊運總機台數：<span id="globalCraneTotalSpan" class="text-base text-red-700 font-black underline decoration-double">0</span> 台
                </div>
            </div>
            
            <div id="adminLoginArea" class="flex flex-wrap gap-2 items-center w-full xl:w-auto justify-start xl:justify-end">
                <div id="exportWrapper" class="flex gap-2 items-center hidden mr-2">
                    <input type="month" id="exportMonthFilter" class="bg-white border border-zinc-200 text-zinc-800 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-400 font-medium">
                    <button type="button" id="exportExcelBtn" class="bg-emerald-700 hover:bg-emerald-800 text-white text-sm px-4 py-1.5 rounded-lg transition shadow font-semibold cursor-pointer">📊 匯出選定月份報表</button>
                </div>

                <div id="superAdminWrapper" class="flex gap-2 items-center hidden mr-2">
                    <button type="button" id="exportAllJsonBtn" class="bg-indigo-700 hover:bg-indigo-800 text-white text-sm px-4 py-1.5 rounded-lg transition shadow font-bold cursor-pointer">📥 匯出雲端全資料庫總備份 (JSON)</button>
                    <button type="button" id="clearAllDbBtn" class="bg-red-700 hover:bg-red-800 text-white text-sm px-4 py-1.5 rounded-lg transition shadow font-bold cursor-pointer">🔥 超級特權：一鍵清空資料庫</button>
                    <label class="bg-blue-700 hover:bg-blue-800 text-white text-sm px-4 py-1.5 rounded-lg transition shadow font-bold cursor-pointer">
                        📥 一鍵批次匯入備份 (JSON)
                        <input type="file" id="importJsonFile" accept=".json" class="hidden">
                    </label>
                </div>
                
                <input type="password" id="adminPassword" placeholder="輸入站點特權金鑰" class="bg-white border border-zinc-200 text-zinc-800 rounded-lg px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-400">
                <button id="adminLoginBtn" class="bg-zinc-800 hover:bg-black text-white text-sm px-4 py-1 rounded-lg transition window cursor-pointer">認證特權暗號</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const GATE_PASSWORD  = "kl"; // 網頁解鎖進門密碼：小寫 kl
        const BACKEND_SECRET = "kldriver_secure_key_999"; 

        const ADMIN_PASSWORDS = {
            "BEkldr": "BE/Recon",
            "RDLkldr": "RDL",
            "FCkldr": "FC",
            "SUPERkldr": "SUPER_ADMIN" 
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBEgKgE6dr0dV3MtRz3lrgQzAHVZNhvoPY",
            authDomain: "kldriver.firebaseapp.com",
            projectId: "kldriver",
            storageBucket: "kldriver.firebasestorage.app",
            messagingSenderId: "773359626716",
            appId: "1:773359626716:web:bd627c9d5f464f658e0719"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scheduleRef = collection(db, "kldr");

        let globalEventsArray = []; 
        let localSchedules = [];
        let isAdmin = false;       
        let currentAdminDept = null; 
        let activeSelectedDocId = null; 
        let activeSelectedDocDept = null; 
        let activeSelectedDocType = null; 
        let calendar; 

        const now = new Date();
        const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('exportMonthFilter').value = currentYearMonth;

        window.closeCustomModal = function() {
            document.getElementById('customAlertModal').style.display = 'none';
            activeSelectedDocId = null;
            activeSelectedDocDept = null;
            activeSelectedDocType = null;
        }

        document.getElementById('gatePassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('unlockBtn').click();
            }
        });

        document.getElementById('unlockBtn').addEventListener('click', () => {
            const input = document.getElementById('gatePassword').value;
            if (input === GATE_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainSystem').classList.remove('hidden');
                initSystem();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('adminLoginBtn').click();
            }
        });

        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            const input = document.getElementById('adminPassword').value.trim();
            
            if (ADMIN_PASSWORDS[input]) {
                currentAdminDept = ADMIN_PASSWORDS[input]; 
                isAdmin = true; 
                
                if (currentAdminDept === "SUPER_ADMIN") {
                    document.getElementById('currentRole').innerText = `⚡ 核心管理員：[SUPER ADMIN] 資料庫最高控制主權已開通`;
                    document.getElementById('currentRole').className = "font-bold text-red-600";
                    document.getElementById('superAdminWrapper').classList.remove('hidden'); 
                    document.getElementById('exportWrapper').classList.remove('hidden'); 
                } else {
                    document.getElementById('currentRole').innerText = `👑 最高特權：[${currentAdminDept}] 站點維護員 (已開啟專屬前端擦拭功能)`;
                    document.getElementById('currentRole').className = "font-bold text-emerald-700";
                    document.getElementById('exportWrapper').classList.remove('hidden');
                }
                
                document.getElementById('adminLoginArea').querySelector('input[type="password"]').style.display = "none";
                document.getElementById('adminLoginBtn').style.display = "none";
                alert(`權限驗證成功！現已成功開通專屬高階維護功能。`);
            } else {
                alert("特權金鑰錯誤！權限驗證失敗。");
            }
        });

        function getDeptColor(deptName) {
            const fixedColors = {
                "BE/Recon": "#1d4ed8",  
                "RDL": "#c2410c",       
                "FC": "#047857"         
            };
            if (fixedColors[deptName]) return fixedColors[deptName];
            let hash = 0;
            for (let i = 0; i < deptName.length; i++) {
                hash = deptName.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash % 360);
            return `hsl(${h}, 75%, 40%)`; 
        }

        function formatToTaiwanTime(isoString) {
            if (!isoString) return "";
            try {
                const date = new Date(isoString);
                if (isNaN(date.getTime())) return isoString;
                return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
            } catch (e) { return isoString; }
        }

        function applyLiveFilters() {
            const selectedFloor = document.getElementById('filterFloor').value;
            const selectedDept = document.getElementById('filterDept').value;

            const filteredEvents = globalEventsArray.filter(evt => {
                const matchFloor = (selectedFloor === "ALL") || (evt.extendedProps.floor === selectedFloor);
                const matchDept = (selectedDept === "ALL") || (evt.extendedProps.department === selectedDept);
                return matchFloor && matchDept;
            });

            if (calendar) {
                calendar.setOption('events', filteredEvents);
            }
        }

        function initSystem() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: 'auto', 
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                buttonText: { today: '今天' },
                validRange: { end: '2027-06-01' },
                
                dateClick: function(info) {
                    const targetDate = info.dateStr;
                    const dayEvents = localSchedules.filter(item => item.date === targetDate);
                    
                    const countBE = dayEvents.filter(e => e.department === "BE/Recon").length;
                    const countFC = dayEvents.filter(e => e.department === "FC").length;
                    const countRDL = dayEvents.filter(e => e.department === "RDL").length;

                    const amEvents = dayEvents.filter(item => item.time.includes("上午"));
                    const pmEvents = dayEvents.filter(item => item.time.includes("下午"));

                    let amString = amEvents.length > 0 ? amEvents.map(e => `   • <span class="text-zinc-600 font-bold">[${e.workType || '吊運'}]</span> [${e.floor || '未填'}-${e.department}]  機台: ${e.machine || '未填'}  人員: ${e.worker_name}`).join('\n') : "   (目前無排程)";
                    let pmString = pmEvents.length > 0 ? pmEvents.map(e => `   • <span class="text-zinc-600 font-bold">[${e.workType || '吊運'}]</span> [${e.floor || '未填'}-${e.department}]  機台: ${e.machine || '未填'}  人員: ${e.worker_name}`).join('\n') : "   (目前無排程)";

                    const modalContentHtml = 
                        `<div class="bg-zinc-50 p-3 rounded-lg border border-zinc-200 mb-3"><span class="text-amber-600 font-bold">☀️ 上午場</span>\n${amString}</div>` +
                        `<div class="bg-zinc-50 p-3 rounded-lg border border-zinc-200"><span class="text-indigo-600 font-bold">🌙 下午場</span>\n${pmString}</div>`;
                    
                    document.getElementById('modalTitle').innerText = `📅 【 ${targetDate} 排程總覽 】`;
                    document.getElementById('modalStatsTitle').innerText = `➔ 當日總計機台 ➔ BE/Recon: ${countBE}台, FC: ${countFC}台, RDL: ${countRDL}台`;
                    
                    document.getElementById('modalBody').innerHTML = modalContentHtml;
                    document.getElementById('modalDeleteBtn').classList.add('hidden'); 
                    document.getElementById('modalToggleWorkTypeBtn').classList.add('hidden'); 
                    document.getElementById('customAlertModal').style.display = 'flex'; 
                },
                
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    activeSelectedDocId = info.event.id;
                    activeSelectedDocDept = props.department;
                    activeSelectedDocType = props.workType || "吊運";
                    const activeFloor = props.floor || "1F";

                    const hasPermission = (currentAdminDept === "SUPER_ADMIN" || (currentAdminDept && currentAdminDept === activeSelectedDocDept));

                    let floorContentHtml = "";
                    if (hasPermission) {
                        floorContentHtml = `<select id="modalFloorSelect" class="bg-white border border-zinc-300 text-zinc-800 font-bold rounded-md px-2 py-0.5 ml-1 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-400 transition">
                            <option value="1F" ${activeFloor === '1F' ? 'selected' : ''}>1F</option>
                            <option value="2F" ${activeFloor === '2F' ? 'selected' : ''}>2F</option>
                            <option value="3F" ${activeFloor === '3F' ? 'selected' : ''}>3F</option>
                            <option value="4F" ${activeFloor === '4F' ? 'selected' : ''}>4F</option>
                            <option value="5F" ${activeFloor === '5F' ? 'selected' : ''}>5F</option>
                            <option value="6F" ${activeFloor === '6F' ? 'selected' : ''}>6F</option>
                        </select> <span class="text-xs text-blue-600 font-bold">(點擊即自動同步雲端)</span>`;
                    } else {
                        floorContentHtml = `<span class="text-zinc-900 font-bold">${activeFloor}</span>`;
                    }

                    const detailHtml = `<div class="bg-zinc-50 p-4 rounded-xl border border-zinc-200">` +
                        `• <b>預約日期：</b>${info.event.startStr}<br>` +
                        `• <b>預約時段：</b>${props.timePeriod || '未填'}<br>` +
                        `• <b>作業項目：</b><span class="text-blue-700 font-black">${activeSelectedDocType}</span><br>` +
                        `• <b>樓層欄位：</b>${floorContentHtml}<br>` +
                        `• <b>所屬站點：</b>${props.department || '未填'}<br>` +
                        `• <b>機台名稱：</b>${props.machine || '未填'}<br>` +
                        `• <b>負責人員：</b>${props.worker_name || '未填'}` +
                        `</div>`;
                    
                    document.getElementById('modalTitle').innerText = `📋 預約項目詳細詳情`;
                    document.getElementById('modalStatsTitle').innerText = ""; 
                    document.getElementById('modalBody').innerHTML = detailHtml;
                    
                    if (hasPermission) {
                        document.getElementById('modalDeleteBtn').classList.remove('hidden');
                        
                        const nextType = activeSelectedDocType === "吊運" ? "電梯" : "吊運";
                        document.getElementById('modalToggleWorkTypeBtn').innerText = `🔄 直接變更作業項目為：【${nextType}】`;
                        document.getElementById('modalToggleWorkTypeBtn').classList.remove('hidden');

                        document.getElementById('modalFloorSelect').addEventListener('change', async (e) => {
                            const newFloor = e.target.value;
                            try {
                                const docRef = doc(db, "kldr", activeSelectedDocId);
                                await updateDoc(docRef, { floor: newFloor });
                                alert(`🎉 樓層更新成功！該筆排程已一秒無痛變更為【${newFloor}】。`);
                                closeCustomModal();
                            } catch (err) {
                                alert("🚨 變更失敗：請確認 Firebase 後台規則已開通 floor 欄位更新權限！");
                                console.error(err);
                            }
                        });
                    } else {
                        document.getElementById('modalDeleteBtn').classList.add('hidden');
                        document.getElementById('modalToggleWorkTypeBtn').classList.add('hidden');
                    }
                    document.getElementById('customAlertModal').style.display = 'flex';
                }
            });
            calendar.render();

            document.getElementById('modalToggleWorkTypeBtn').addEventListener('click', async () => {
                if (!activeSelectedDocId || !currentAdminDept) return;
                
                const nextType = activeSelectedDocType === "吊運" ? "電梯" : "吊運";
                const confirmToggle = confirm(`🔄 【管理員特權即時變更】\n您確定要直接將這筆排程的作業項目修改為【${nextType}】嗎？\n(免刪除、免重新填寫，點擊確認直接生效)`);
                
                if (confirmToggle) {
                    try {
                        const docRef = doc(db, "kldr", activeSelectedDocId);
                        await updateDoc(docRef, { workType: nextType });
                        
                        alert(`🎉 變更成功！該排程已一秒無痛變更為【${nextType}】。`);
                        closeCustomModal();
                    } catch (error) {
                        alert("🚨 變更失敗：請檢查與 Firebase 的雲端連線狀態！");
                        console.error(error);
                    }
                }
            });

            document.getElementById('modalDeleteBtn').addEventListener('click', async () => {
                if (!activeSelectedDocId || !currentAdminDept) return;
                const confirmDelete = confirm(`⚠️ 【特權確認】\n您確定要將這筆排程從雲端徹底移除嗎？\n(移除後無法復原)`);
                if (confirmDelete) {
                    try {
                        const docRef = doc(db, "kldr", activeSelectedDocId);
                        const token = currentAdminDept === "SUPER_ADMIN" ? "SUPERkldr" : document.getElementById('adminPassword').value.trim();
                        await setDoc(docRef, { request_delete_pass: token }, { merge: true });
                        await deleteDoc(docRef);
                        alert("🎉 刪除成功！該筆資料已即時自雲端移除清空。");
                        closeCustomModal();
                    } catch (error) { alert("🚨 刪除失敗！"); }
                }
            });

            document.getElementById('exportAllJsonBtn').addEventListener('click', async () => {
                if(currentAdminDept !== "SUPER_ADMIN") return alert("🚨 特權拒絕：此按鈕限最高核心管理員使用！");
                
                const confirmExport = confirm("📥 【最高控制主權確認】\n您即將下載此 Firebase 資料庫內的『所有歷史總排程紀錄』JSON 還原備份檔案。\n此動作將撈取全體資料。是否確認執行？");
                if (!confirmExport) return;

                document.getElementById('exportAllJsonBtn').disabled = true;
                document.getElementById('exportAllJsonBtn').innerText = "⚡ 正在直攻核心撈取中...";

                try {
                    const querySnapshot = await getDocs(scheduleRef);
                    const allDataArray = [];
                    
                    querySnapshot.forEach((doc) => {
                        const d = doc.data();
                        allDataArray.push({
                            date: d.date,
                            time: d.time,
                            workType: d.workType || "吊運",
                            floor: d.floor || "1F",
                            department: d.department,
                            machine: d.machine || "未填",
                            worker_name: d.worker_name || "未填",
                            created_at: d.created_at || new Date().toISOString()
                        });
                    });

                    const finalJsonString = JSON.stringify(allDataArray, null, 2);
                    const blob = new Blob([finalJsonString], { type: 'application/json;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    
                    const timeStamp = new Date().toISOString().slice(0,10);
                    const link = document.createElement("a");
                    link.setAttribute("href", url);
                    link.setAttribute("download", `Firebase資料庫全紀錄總備份_${timeStamp}.json`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert(`🎉 總資料庫備份成功！已精準導出共 [ ${allDataArray.length} ] 筆完整產線歷史數據檔。`);
                } catch (err) {
                    alert("🚨 導出失敗：請檢查網絡或 Firebase SDK 連線狀況！");
                    console.error(err);
                } finally {
                    document.getElementById('exportAllJsonBtn').disabled = false;
                    document.getElementById('exportAllJsonBtn').innerText = "📥 匯出雲端全資料庫總備份 (JSON)";
                }
            });

            document.getElementById('clearAllDbBtn').addEventListener('click', async () => {
                const doubleCheck = confirm("🚨🚨🚨【警告：極度危險操作】\n您正在準備『一鍵清空整個 Firebase 雲端資料庫』的所有行事曆數據！\n這將會使目前線全體排程在 1 秒內徹底蒸發。\n\n您確定要繼續執行嗎？");
                if (doubleCheck) {
                    const tripleCheck = prompt("為了防止誤觸，請在下方輸入大寫密碼 『RESET_ALL』 以確認抹除資料：");
                    if (tripleCheck === "RESET_ALL") {
                        try {
                            const querySnapshot = await getDocs(scheduleRef);
                            const batch = writeBatch(db);
                            
                            querySnapshot.forEach((documentSnapshot) => {
                                batch.set(documentSnapshot.ref, { request_delete_pass: "SUPERkldr" }, { merge: true });
                            });
                            await batch.commit();

                            const deleteBatch = writeBatch(db);
                            querySnapshot.forEach((documentSnapshot) => {
                                deleteBatch.delete(documentSnapshot.ref);
                            });
                            await deleteBatch.commit();
                            
                            alert("💥 資料庫已成功完成徹底淨空！目前線上排程已重置為 0 筆。");
                        } catch (error) {
                            alert("🚨 抹除失敗：請確保 Firebase Rules 規則已正確發布上線！");
                            console.error(error);
                        }
                    } else {
                        alert("🔒 密碼不符，全刪除指令已被安全安全攔截。");
                    }
                }
            });

            document.getElementById('importJsonFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async function(evt) {
                    try {
                        const importedSchedules = JSON.parse(evt.target.result);
                        if (!Array.isArray(importedSchedules)) { alert("🚨 匯入失敗：檔案格式不符合規範，必須為一個 JSON 陣列！"); return; }
                        const proceed = confirm(`📋 偵測到備份檔中含有 [ ${importedSchedules.length} ] 筆排程數據。\n確定要將這些資料批次寫入 Firebase 數據庫中嗎？`);
                        if (proceed) {
                            let successCount = 0; let batch = writeBatch(db); let count = 0;
                            for (const item of importedSchedules) {
                                if (item.date && item.time && item.department) {
                                    const uniqueId = Math.floor(Math.random() * 100000);
                                    const safeDeptName = item.department.replace('/', '-'); 
                                    const customDocName = `${item.date}_${item.time}_${item.workType || '吊運'}_${item.floor || '1F'}_${safeDeptName}_${item.worker_name || '備份'}_${uniqueId}`;
                                    const customDocRef = doc(db, "kldr", customDocName);
                                    batch.set(customDocRef, {
                                        date: item.date, time: item.time, workType: item.workType || "吊運",
                                        floor: item.floor || "1F", department: item.department, machine: item.machine || "未填", 
                                        worker_name: item.worker_name || "未填", secret_key: BACKEND_SECRET, created_at: item.created_at || new Date().toISOString()
                                    });
                                    count++; successCount++;
                                    if (count === 400) { await batch.commit(); batch = writeBatch(db); count = 0; }
                                }
                            }
                            if (count > 0) { await batch.commit(); }
                            alert(`🎉 批次匯入大成功！已成功同步 ${successCount} 筆排程數據。`);
                            document.getElementById('importJsonFile').value = ''; 
                        }
                    } catch (err) { alert("🚨 讀取 JSON 檔案發生錯誤，請確保該檔案結構完全正確！\n錯誤訊息: " + err.message); }
                };
                reader.readAsText(file);
            });

            onSnapshot(scheduleRef, (snapshot) => {
                globalEventsArray = []; localSchedules = [];
                // 🚀 初始化全歷史吊運計數器
                let totalCranesCount = 0;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.date && data.time && data.department) {
                        localSchedules.push(data);
                        
                        const currentWorkType = data.workType || "吊運";
                        // 🚀 關鍵加總邏輯：只要全雲端歷史資料中作業項目為「吊運」，計數器就無條件累加 1
                        if (currentWorkType === "吊運") {
                            totalCranesCount++;
                        }

                        const colorValue = getDeptColor(data.department);
                        const showTime = data.time.includes("上午") ? "上午" : "下午";
                        const floorPrefix = data.floor ? `[${data.floor}]` : "";
                        const typePrefix = `[${currentWorkType}]`; 
                        
                        globalEventsArray.push({
                            id: doc.id, title: `${typePrefix} ${showTime}: ${floorPrefix}${data.department} 人員: ${data.worker_name} (${data.machine || '未填'})`, 
                            start: data.date, allDay: true, backgroundColor: colorValue, borderColor: colorValue,
                            extendedProps: { floor: data.floor || "", department: data.department, machine: data.machine, timePeriod: data.time, worker_name: data.worker_name, workType: currentWorkType }
                        });
                    }
                });
                
                // 🚀 將即時跑出來的吊運歷史總數渲染到左下角精美面版上
                document.getElementById('globalCraneTotalSpan').innerText = totalCranesCount;
                applyLiveFilters(); 
            });

            document.getElementById('filterFloor').addEventListener('change', applyLiveFilters);
            document.getElementById('filterDept').addEventListener('change', applyLiveFilters);
            document.getElementById('resetFilterBtn').addEventListener('click', () => {
                document.getElementById('filterFloor').value = "ALL"; document.getElementById('filterDept').value = "ALL"; applyLiveFilters();
            });

            document.getElementById('exportExcelBtn').addEventListener('click', () => {
                if(localSchedules.length === 0) { alert("目前雲端沒有任何排程數據可以導出！"); return; }
                const selectedMonth = document.getElementById('exportMonthFilter').value;
                if (!selectedMonth) { alert("請先選擇要匯出的月份！"); return; }
                const filteredSchedules = localSchedules.filter(item => item.date && item.date.startsWith(selectedMonth));
                if (filteredSchedules.length === 0) { alert(`⚠️ 匯出失敗：在您指定的月份 [${selectedMonth}] 中，目前沒有數據。`); return; }

                const backupJsonString = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(filteredSchedules, null, 2));
                const jsonAnchor = document.createElement('a'); jsonAnchor.setAttribute("href", backupJsonString); jsonAnchor.setAttribute("download", `排程雲端數據還原檔_${selectedMonth}.json`);
                document.body.appendChild(jsonAnchor); jsonAnchor.click(); document.body.removeChild(jsonAnchor);

                let csvContent = "\uFEFF日期,時段,作業項目,樓層,部門/站點,機台名稱,負責人姓名,建立時間(台灣時區)\n";
                const sortedSchedules = [...filteredSchedules].sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                sortedSchedules.forEach(item => {
                    csvContent += `"${item.date}","${item.time}","${item.workType || '吊運'}","${item.floor || '未填'}","${item.department}","${item.machine || '未填'}","${item.worker_name}","${formatToTaiwanTime(item.created_at)}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", `吊運及電梯排程月報表_${selectedMonth}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            });
        }

        const form = document.getElementById('scheduleForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "正在即時同步...";
            const payload = {
                date: document.getElementById('date').value, time: document.getElementById('timePeriod').value,
                workType: document.getElementById('workType').value, floor: document.getElementById('floor').value,
                department: document.getElementById('department').value, machine: document.getElementById('machine').value.trim(), 
                worker_name: document.getElementById('name').value.trim(), secret_key: BACKEND_SECRET, created_at: new Date().toISOString()
            };
            try {
                const uniqueId = Date.now() % 100000; const safeDeptName = payload.department.replace('/', '-'); 
                const customDocName = `${payload.date}_${payload.time}_${payload.workType}_${payload.floor}_${safeDeptName}_${payload.worker_name}_${uniqueId}`;
                await setDoc(doc(db, "kldr", customDocName), payload);
                alert('🎉 排程已成功同步至雲端資料庫！');
                document.getElementById('name').value = ''; document.getElementById('machine').value = ''; document.getElementById('department').value = ''; document.getElementById('floor').value = '';
            } catch (error) { alert('🚨 同步失敗！請檢查權限。'); console.error(error); } finally { btn.disabled = false; btn.innerText = "確認排程"; }
        };
    </script>
</body>
</html>
