<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吊運排程管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 🎨 全域黑灰色底色配置 */
        body {
            background-color: #121214 !important;
            color: #e4e4e7 !important;
        }

        /* 🎨 強制卡片變成長條狀、填滿顏色、無邊框 */
        .fc-event { 
            cursor: pointer; 
            padding: 6px 10px !important; 
            font-size: 0.88em !important; 
            border-radius: 6px !important; 
            margin-bottom: 4px !important; 
            border: none !important;
            display: block !important; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .fc-event:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .fc-event-title { 
            font-weight: 600 !important; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            overflow: hidden; 
            color: #ffffff !important; /* 文字一律白色 */
        }
        /* 隱藏預設的時間點點 */
        .fc-daygrid-event-dot { display: none !important; }
        .fc-event-time { display: none !important; }
        
        /* 🔒 密碼遮罩深色藝術微調 */
        #passwordOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0d0d0e; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }

        /* 📅 FullCalendar 核心深色藝術化重置 */
        .fc {
            --fc-border-color: #2d2d34 !important;
            --fc-page-bg-color: #1e1e24 !important;
            --fc-neutral-text-color: #a1a1aa !important;
            --fc-list-event-hover-bg-color: #2d2d34 !important;
        }
        .fc .fc-col-header-cell {
            background-color: #18181b !important;
            padding: 10px 0 !important;
            color: #e4e4e7 !important;
        }
        .fc .fc-daygrid-day-number {
            color: #d4d4d8 !important;
            padding: 6px 8px !important;
            font-weight: 500;
        }
        /* 今天格子的藝術高亮 */
        .fc .fc-day-today {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border: 2px solid #eab308 !important;
        }
        /* 修正非本月格子的微透明度 */
        .fc-day-other {
            opacity: 0.35;
        }
        /* 行事曆標題 */
        .fc .fc-toolbar-title {
            color: #f4f4f5 !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
        }
        /* 按鈕深色重置 */
        .fc .fc-button-primary {
            background-color: #27272a !important;
            border-color: #3f3f46 !important;
            color: #e4e4e7 !important;
            transition: all 0.2s;
        }
        .fc .fc-button-primary:hover {
            background-color: #3f3f46 !important;
            border-color: #52525b !important;
        }
        .fc .fc-button-primary:disabled {
            background-color: #18181b !important;
            opacity: 0.5;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="passwordOverlay">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold text-zinc-100 mb-2">🏗️ 內部系統限制存取</h2>
            <p class="text-sm text-zinc-400 mb-6">請輸入密碼解鎖排程管理系統</p>
            <input type="password" id="gatePassword" placeholder="請輸入系統解鎖密碼" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-center mb-4 text-zinc-100 focus:outline-none focus:ring-2 focus:ring-zinc-600 focus:border-transparent transition">
            <button id="unlockBtn" class="w-full bg-zinc-200 hover:bg-white text-zinc-950 font-semibold py-2.5 rounded-lg transition shadow-lg">驗證並解鎖</button>
            <p id="loginError" class="text-red-400 text-xs mt-3 hidden">⚠️ 密碼錯誤，拒絕存取！</p>
        </div>
    </div>

    <div id="mainSystem" class="max-w-6xl mx-auto bg-zinc-900/50 border border-zinc-800/80 rounded-2xl shadow-2xl p-6 hidden backdrop-blur-md">
        <h1 class="text-2xl font-bold text-zinc-100 mb-6 text-center tracking-wider flex items-center justify-center gap-2">
            🏗️ 吊運排程管理系統
        </h1>

        <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-5 gap-4 bg-zinc-900 p-5 rounded-xl mb-8 border border-zinc-800">
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">日期</label>
                <input type="date" id="date" required class="w-full bg-zinc-950 border border-zinc-800 text-zinc-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-700 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">時間時段</label>
                <select id="timePeriod" required class="w-full bg-zinc-950 border border-zinc-800 text-zinc-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-700 transition">
                    <option value="上午場">上午場</option>
                    <option value="下午場">下午場</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">部門 / 站點</label>
                <select id="department" required class="w-full bg-zinc-950 border border-zinc-800 text-zinc-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-700 transition">
                    <option value="" class="text-zinc-500">-- 請選擇站點 --</option>
                    <option value="站點A">站點A</option>
                    <option value="站點B">站點B</option>
                    <option value="站點C">站點C</option>
                    <option value="製造部">製造部</option>
                    <option value="噴漆組">噴漆組</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">負責人姓名</label>
                <input type="text" id="name" placeholder="請輸入負責人" required class="w-full bg-zinc-950 border border-zinc-800 text-zinc-200 rounded-lg px-3 py-2 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-zinc-700 transition">
            </div>
            <div class="flex items-end">
                <button type="submit" id="submitBtn" class="w-full bg-zinc-200 hover:bg-white text-zinc-950 font-bold py-2 px-4 rounded-lg transition shadow-md tracking-wide cursor-pointer">
                    確認排程
                </button>
            </div>
        </form>

        <hr class="border-zinc-800 my-6">
        
        <div id="calendar" class="p-3 rounded-xl border border-zinc-800 bg-zinc-900/30"></div>

        <div class="mt-8 p-4 bg-zinc-900 rounded-xl border border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-sm text-zinc-400">
                🔑 當前身分：<span id="currentRole" class="font-bold text-zinc-300">一般同仁 (僅能查看/排程)</span>
            </div>
            <div id="adminLoginArea" class="flex gap-2">
                <input type="password" id="adminPassword" placeholder="管理員特權密碼" class="bg-zinc-950 border border-zinc-800 text-zinc-200 rounded-lg px-3 py-1 text-sm placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-700">
                <button id="adminLoginBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-sm px-4 py-1 rounded-lg transition cursor-pointer">解鎖權限</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const GATE_PASSWORD  = "ase";      
        const ADMIN_PASSWORD = "K12438";          
        const BACKEND_SECRET = "kldriver_secure_key_999"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBEgKgE6dr0dV3MtRz3lrgQzAHVZNhvoPY",
            authDomain: "kldriver.firebaseapp.com",
            projectId: "kldriver",
            storageBucket: "kldriver.firebasestorage.app",
            messagingSenderId: "773359626716",
            appId: "1:773359626716:web:bd627c9d5f464f658e0719"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scheduleRef = collection(db, "kldr");

        let localSchedules = [];
        let isAdmin = false;   

        document.getElementById('unlockBtn').addEventListener('click', () => {
            const input = document.getElementById('gatePassword').value;
            if (input === GATE_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainSystem').classList.remove('hidden');
                initSystem();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            const input = document.getElementById('adminPassword').value;
            if (input === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('currentRole').innerText = "👑 最高管理員 (已開通前端一鍵修改刪除特權)";
                document.getElementById('currentRole').className = "font-bold text-red-400";
                document.getElementById('adminLoginArea').style.display = "none";
                alert("最高管理員驗證成功！現在點選行事曆卡片，即可直接一鍵刪除排程。");
            } else {
                alert("管理員密碼錯誤！拒絕存取特權。");
            }
        });

        // 🎨 部門/站點 專屬固定顏色對照表（維持不變）
        function getDeptColor(deptName) {
            const fixedColors = {
                "站點A": "#2563eb",  // 經典深藍
                "站點B": "#ea580c",  // 亮工業橘
                "站點C": "#16a34a",  // 產線翠綠
                "製造部": "#7c3aed", // 時尚深紫
                "噴漆組": "#db2777"  // 質感深粉
            };

            if (fixedColors[deptName]) {
                return fixedColors[deptName];
            } else {
                let hash = 0;
                for (let i = 0; i < deptName.length; i++) {
                    hash = deptName.charCodeAt(i) + ((hash << 5) - hash);
                }
                const h = Math.abs(hash % 360);
                return `hsl(${h}, 65%, 45%)`; 
            }
        }

        function initSystem() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                buttonText: { today: '今天' },
                
                validRange: {
                    end: '2027-06-01'
                },
                
                dateClick: function(info) {
                    const targetDate = info.dateStr;
                    const dayEvents = localSchedules.filter(item => item.date === targetDate);
                    const amEvents = dayEvents.filter(item => item.time.includes("上午"));
                    const pmEvents = dayEvents.filter(item => item.time.includes("下午"));

                    let amString = amEvents.length > 0 ? amEvents.map(e => `  - [${e.department}] ${e.worker_name}`).join('\n') : "  (目前無排程)";
                    let pmString = pmEvents.length > 0 ? pmEvents.map(e => `  - [${e.department}] ${e.worker_name}`).join('\n') : "  (目前無排程)";

                    alert(`📅 【 ${targetDate} 吊運排程總覽】\n--------------------------\n☀️ 上午\n${amString}\n--------------------------\n🌙 下午場\n${pmString}\n--------------------------`);
                },
                
                eventClick: async function(info) {
                    if (!isAdmin) {
                        alert(`📋 排程詳情\n--------------------------\n${info.event.title}\n日期：${info.event.startStr}`);
                        return;
                    }

                    const confirmDelete = confirm(`👑 管理員特權確認：\n是否要將「${info.event.title}」這筆排程直接從雲端刪除清空？`);
                    if (confirmDelete) {
                        try {
                            const docRef = doc(db, "kldr", info.event.id);
                            await deleteDoc(docRef);
                            alert("🎉 該排程已成功從前端一鍵移除，雲端已即時清空！");
                        } catch (error) {
                            alert("刪除失敗！原因：" + error.message);
                        }
                    }
                }
            });
            calendar.render();

            // 即時監聽雲端資料庫
            onSnapshot(scheduleRef, (snapshot) => {
                const events = [];
                localSchedules = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.date && data.time && data.department) {
                        localSchedules.push(data);
                        
                        const colorValue = getDeptColor(data.department);
                        const showTime = data.time.includes("上午") ? "上午場" : "下午場";
                        
                        events.push({
                            id: doc.id, 
                            title: `${showTime}: ${data.department} 人員: ${data.worker_name}`,
                            start: data.date,
                            allDay: true, 
                            backgroundColor: colorValue,
                            borderColor: colorValue
                        });
                    }
                });
                calendar.setOption('events', events);
            });
        }

        // 表單送出新增排程
        const form = document.getElementById('scheduleForm');
        form.onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "正在即時同步...";

            const dateValue = document.getElementById('date').value;
            const timeValue = document.getElementById('timePeriod').value;
            const deptValue = document.getElementById('department').value;
            const nameValue = document.getElementById('name').value.trim();

            const payload = {
                date: dateValue,
                time: timeValue,
                department: deptValue,
                worker_name: nameValue,
                secret_key: BACKEND_SECRET, 
                created_at: new Date().toISOString()
            };

            try {
                const customDocName = `${dateValue}_${timeValue}_${nameValue}`;
                const customDocRef = doc(db, "kldr", customDocName);
                await setDoc(customDocRef, payload);
                alert('🎉 排程已成功同步至雲端資料庫！');
                document.getElementById('name').value = '';
                document.getElementById('department').value = '';
            } catch (error) {
                alert('🚨 同步失敗！請檢查權限。');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "確認排程";
            }
        };
    </script>
</body>
</html>
