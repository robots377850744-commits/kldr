<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>測試連線排程</title>
</head>
<body style="padding: 20px; font-family: sans-serif;">
    <h1>🏗️ 吊運排程連線測試</h1>
    <p>如果此畫面有成功顯示，代表 GitHub 的網頁已經正常復活了！</p>
    
    <div style="background: #f0f0f0; padding: 15px; margin-bottom: 20px;">
        <h3>快速輸入測試欄：</h3>
        負責人姓名：<input type="text" id="testName" value="工程師測試">
        <button id="testBtn">點我送出測試</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEgKgE6dr0dV3MtRz3lrgQzAHVZNhvoPY",
            authDomain: "kldriver.firebaseapp.com",
            projectId: "kldriver",
            storageBucket: "kldriver.firebasestorage.app",
            messagingSenderId: "773359626716",
            appId: "1:773359626716:web:bd627c9d5f464f658e0719"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('testBtn').addEventListener('click', async () => {
            const name = document.getElementById('testName').value;
            try {
                await addDoc(collection(db, "crane_schedules"), {
                    worker_name: name,
                    date: "2026-06-16",
                    time: "12:00",
                    department: "製造部",
                    created_at: new Date().toISOString()
                });
                alert("🎉 恭喜！資料成功寫入 Firebase 雲端資料庫了！");
            } catch (error) {
                alert("錯誤原因: " + error.message);
            }
        });
    </script>
</body>
</html>
